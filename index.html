<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohit Portfolio</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
text-align:center;
}

h1{
color:#00c853;
margin-top:50px;
}

.logo{
width:200px;
border-radius:50%;
box-shadow:0 0 20px #00c853;
margin-top:20px;
animation:float 3s infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

.section{
margin-top:40px;
}

.photo{
width:300px;
border-radius:10px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>Rohit Johnson</h1>

<img src="logo.png" class="logo">

<div class="section">
<h2>Mobile Repair Engineer</h2>
<p>FRP Unlock | Flashing | IMEI Repair | All Services Available 🔥</p>
</div>

<div class="section">
<img src="myphoto.jpg" class="photo">
</div>

</body>
</html>
