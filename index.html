<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RJ Mobile Software Solution</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
}

/* MATRIX */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* NAV */
nav {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid #00ff00;
}

nav a {
    color: #00ff00;
    margin: 0 15px;
    text-decoration: none;
}

nav a:hover {
    text-shadow: 0 0 10px #00ff00;
}

/* HERO */
.hero {
    text-align: center;
    margin-top: 80px;
}

.hero h1 {
    font-size: 35px;
}

.typing {
    border-right: 3px solid #00ff00;
    padding-right: 5px;
}

/* LOGO */
.logo img {
    width: 220px;
    margin-top: 20px;
}

/* ABOUT */
.about {
    max-width: 700px;
    margin: 100px auto;
    text-align: center;
}

/* CONTACT */
.contact {
    text-align: center;
    margin-bottom: 50px;
}

.contact a {
    color: #00ff00;
    text-decoration: none;
    font-size: 18px;
}

.contact a:hover {
    text-shadow: 0 0 10px #00ff00;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<nav>
<a href="#">Home</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</nav>

<div class="hero">
<h1>WELCOME TO <br><span class="typing" id="text"></span></h1>

<div class="logo">
<img src="logo.png" alt="RJ Mobile Logo">
</div>
</div>

<div class="about" id="about">
<h2>About Us</h2>
<p>
RJ MOBILE SOFTWARE SOLUTION 🔥 <br><br>
हम आपको देते हैं Best Mobile Services 💯<br>
FRP Unlock | Flash | Software Repair | Unlock Services ⚡️<br>
Professional GSM Solutions 🚀
</p>
</div>

<div class="contact" id="contact">
<h2>Contact Us</h2>

<p>📞 Call / WhatsApp:</p>

<a href="https://wa.me/918271065431" target="_blank">
+91 8271065431
</a>

</div>

<script>
// typing
let words = ["RJ MOBILE", "SOFTWARE SOLUTION", "GSM EXPERT"];
let i = 0, j = 0, current = "", isDeleting = false;

function type(){
    current = words[i];

    if(!isDeleting){
        document.getElementById("text").innerHTML = current.substring(0, j++);
        if(j > current.length){
            isDeleting = true;
            setTimeout(type, 1000);
            return;
        }
    } else {
        document.getElementById("text").innerHTML = current.substring(0, j--);
        if(j == 0){
            isDeleting = false;
            i = (i+1) % words.length;
        }
    }
    setTimeout(type, 100);
}
type();

// matrix
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for(let x = 0; x < columns; x++) drops[x] = 1;

function draw(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#0f0";
    ctx.font = fontSize + "px monospace";

    for(let i = 0; i < drops.length; i++){
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}
setInterval(draw, 33);
</script>

</body>
</html>
